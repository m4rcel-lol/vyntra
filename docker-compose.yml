name: vyntra

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vyntra}
      POSTGRES_USER: ${POSTGRES_USER:-vyntra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vyntra_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vyntra} -d ${POSTGRES_DB:-vyntra}"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vyntra}:${POSTGRES_PASSWORD:-vyntra_password}@postgres:5432/${POSTGRES_DB:-vyntra}?schema=public
      REDIS_URL: redis://valkey:6379
      STORAGE_DIR: ${STORAGE_DIR:-/app/uploads}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${API_PUBLIC_URL:-http://localhost:3000}
        VITE_SOCKET_URL: ${API_PUBLIC_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  valkey_data:
  uploads_data:
