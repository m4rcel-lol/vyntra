name: vyntra

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?Set POSTGRES_DB in .env}"
      POSTGRES_USER: "${POSTGRES_USER:?Set POSTGRES_USER in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PUBLIC_APP_NAME: "${PUBLIC_APP_NAME:-Vyntra.bio}"
      PUBLIC_APP_URL: "${PUBLIC_APP_URL:-http://localhost:8080}"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-http://localhost:8080}"
      FRONTEND_SHELL_URL: "${FRONTEND_SHELL_URL:-}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env}?schema=public"
      REDIS_URL: redis://valkey:6379
      COOKIE_SECRET: "${COOKIE_SECRET:?Set COOKIE_SECRET in .env}"
      SESSION_COOKIE_NAME: "${SESSION_COOKIE_NAME:-vyntra_session}"
      SESSION_TTL_DAYS: "${SESSION_TTL_DAYS:-30}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-}"
      TRUST_PROXY: "${TRUST_PROXY:-true}"
      STORAGE_DIR: /app/uploads
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-100}"
      PORT: "3000"
      SEED_ADMIN_USERNAME: "${SEED_ADMIN_USERNAME:-owner}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-owner@example.com}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:?Set SEED_ADMIN_PASSWORD in .env}"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-}"
        VITE_SOCKET_URL: "${VITE_SOCKET_URL:-}"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  valkey_data:
  uploads_data:
